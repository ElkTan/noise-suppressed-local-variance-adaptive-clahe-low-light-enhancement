PL UMing CN','WenQuanYi Micro Hei','Microsoft YaHei','PingFang SC','SimHei',sans-serif" font-size="28" font-weight="700" fill="#16a34a" text-anchor="middle"><tspan x="567.0" dy="0">颜色空间转换</tspan></text><text x="435" y="212" font-family="'Noto Sans CJK SC','AR PL UMing CN','WenQuanYi Micro Hei','Microsoft YaHei','PingFang SC','SimHei',sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="start"><tspan x="435" dy="0">RGB -&gt; YCbCr</tspan><tspan x="435" dy="27.599999999999998">分离 Y / Cb / Cr</tspan></text></g><g filter="url(#shadow)"><rect x="780" y="130" width="320" height="155" rx="22" ry="22" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/><circle cx="814" cy="165" r="23" fill="#ffffff" stroke="#ea580c" stroke-width="3"/><text x="814" y="174" font-family="'Noto Sans','Arial',sans-serif" font-size="24" font-weight="700" fill="#ea580c" text-anchor="middle"><tspan x="814" dy="0">3</tspan></text><text x="952.0" y="173" font-family="'Noto Sans CJK SC','AR PL UMing CN','WenQuanYi Micro Hei','Microsoft YaHei','PingFang SC','SimHei',sans-serif" font-size="28" font-weight="700" fill="#ea580c" text-anchor="middle"><tspan x="952.0" dy="0">亮度预处理</tspan></text><text x="810" y="212" font-family="'Noto Sans CJK SC','AR PL UMing CN','WenQuanYi Micro Hei','Microsoft YaHei','PingFang SC','SimHei',sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="start"><tspan x="810" dy="0">仅处理 Y 通道</tspan><tspan x="810" dy="27.599999999999998">Y_tilde = G_sigma * Y</tspan></text></g><g filter="url(#shadow)"><rect x="1180" y="115" width="455" height="190" rx="22" ry="22" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/><circle cx="1214" cy="150" r="23" fill="#ffffff" stroke="#7c3aed" stroke-width="3"/><text x="1214" y="159" font-family="'Noto Sans','Arial',sans-serif" font-size="24" font-weight="700" fill="#7c3aed" text-anchor="middle"><tspan x="1214" dy="0">4</tspan></text><text x="1419.5" y="158" font-family="'Noto Sans CJK SC','AR PL UMing CN','WenQuanYi Micro Hei','Microsoft YaHei','PingFang SC','SimHei',sans-serif" font-size="28" font-weight="700" fill="#7c3aed" text-anchor="middle"><tspan x="1419.5" dy="0">结构方差与噪声估计</tspan></text><text x="1210" y="197" font-family="'Noto Sans CJK SC','AR PL UMing CN','WenQuanYi Micro Hei','Microsoft YaHei','PingFang SC','SimHei',sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="start"><tspan x="1210" dy="0">tile 网格划分</tspan><tspan x="1210" dy="27.599999999999998">v_ij = Var(Y_tilde_ij)</tspan><tspan x="1210" dy="27.599999999999998">R = Y - Y_tilde</tspan><tspan x="1210" dy="27.599999999999998">s_ij = max(v_ij - lambda*sigma_n^2, 0)</tspan></text></g><g filter="url(#shadow)"><rect x="1710" y="115" width="455" height="190" rx="22" ry="22" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/><circle cx="1744" cy="150" r="23" fill="#ffffff" stroke="#0891b2" stroke-width="3"/><text x="1744" y="159" font-family="'Noto Sans','Arial',sans-serif" font-size="24" font-weight="700" fill="#0891b2" text-anchor="middle"><tspan x="1744" dy="0">5</tspan></text><text x="1949.5" y="158" font-family="'Noto Sans CJK SC','AR PL UMing CN','WenQuanYi Micro Hei','Microsoft YaHei','PingFang SC','SimHei',sans-serif" font-size="28" font-weight="700" fill="#0891b2" text-anchor="middle"><tspan x="1949.5" dy="0">自适应 clip map</tspan></text><text x="1740" y="197" font-family="'Noto Sans CJK SC','AR PL UMing CN','WenQuanYi Micro Hei','Microsoft YaHei','PingFang SC','SimHei',sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="start"><tspan x="1740" dy="0">s_hat = qnorm(s_ij)</tspan><tspan x="1740" dy="27.599999999999998">C = C_min + DeltaC*s_hat^gamma</tspan><tspan x="1740" dy="27.599999999999998">2D smooth：C -&gt; C_tilde</tspan></text></g><g filter="url(#shadow)"><rect x="1710" y="535" width="455" height="210" rx="22" ry="22" fill="#fffbeb" stroke="#d97706" stroke-width="3"/><circle cx="1744" cy="570" r="23" fill="#ffffff" stroke="#d97706" stroke-width="3"/><text x="1744" y="579" font-family="'Noto Sans','Arial',sans-serif" font-size="24" font-weight="700" fill="#d97706" text-anchor="middle"><tspan x="1744" dy="0">6</tspan></text><text x="1949.5" y="578" font-family="'Noto Sans CJK SC','AR PL UMing CN','WenQuanYi Micro Hei','Microsoft YaHei','PingFang SC','SimHei',sans-serif" font-size="28" font-weight="700" fill="#d97706" text-anchor="middle"><tspan x="1949.5" dy="0">tile 级 CLAHE-LUT</tspan></text><text x="1740" y="617" font-family="'Noto Sans CJK SC','AR PL UMing CN','WenQuanYi Micro Hei','Microsoft YaHei','PingFang SC','SimHei',sans-serif" font-size="21" font-weight="400" fill="#111827" text-anchor="start"><tspan x="1740" dy="0">每个 tile 统计局部直方图</tspan><tspan x="1740" dy="28.979999999999997">按 C_tilde_ij 剪切并重分配</tspan><tspan x="1740" dy="28.979999999999997">得到 LUT：T_ij</tspan></text></g><g filter="url(#shadow)"><rect x="1180" y="585" width="455" height="175" rx="22" ry="22" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/><circle cx="1214" cy="620" r="23" fill="#ffffff" stroke="#2563eb" stroke-width="3"/><text x="1214" y="629" font-family="'Noto Sans','Arial',sans-serif" font-size="24" font-weight="700" fill="#2563eb" text-anchor="middle"><tspan x="1214" dy="0">7</tspan></text><text x="1419.5" y="628" font-family="'Noto Sans CJK SC','AR PL UMing CN','WenQuanYi Micro Hei','Microsoft YaHei','PingFang SC','SimHei',sans-serif" font-size="28" font-weight="700" fill="#2563eb" text-anchor="middle"><tspan x="1419.5" dy="0">tile 间双线性融合</tspan></text><text x="1210" y="667" font-family="'Noto Sans CJK SC','AR PL UMing CN','WenQuanYi Micro Hei','Microsoft YaHei','PingFang SC','SimHei',sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="start"><tspan x="1210" dy="0">相邻 4 个 tile LUT 加权</tspan><tspan x="1210" dy="27.599999999999998">Y_enh = sum(w_mn*T_mn(Y))</tspan><tspan x="1210" dy="27.599999999999998">降低块边界突变</tspan></text></g><g filter="url(#shadow)"><rect x="780" y="585" width="320" height="175" rx="22" ry="22" fil